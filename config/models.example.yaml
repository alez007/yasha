# vllm engine args reference: https://docs.vllm.ai/en/latest/configuration/engine_args.html

models:
  # Kokoro (ONNX TTS) — Ray schedules freely
  -
    name: "kokoro"
    model: "hexgrad/Kokoro-82M"
    usecase: "tts"
    loader: "custom"
    plugin: "kokoro"
    num_gpus: 0.1
    plugin_config:
      onnx_provider: "CUDAExecutionProvider"  # or "CPUExecutionProvider"

  # Bark (transformers TTS) — Ray schedules freely
