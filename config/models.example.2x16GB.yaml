# 2 × 16 GB GPU — Dual-GPU stack
# LLM: Qwen2.5-14B-AWQ (int4, single GPU, 32K ctx) · embed: nomic · STT: Whisper Large-v3-Turbo · TTS: Kokoro
# GPU budget: GPU 0: 1.00 (llm) / GPU 1: 0.08 (nomic) + 0.08 (whisper) = 0.16
#
# AWQ int4 brings Qwen2.5-14B (~28 GB at bf16) down to ~7.5 GB, leaving ~6.9 GB for KV cache.
# fp8 KV cache halves KV memory (~96 KB/token). Model max_position_embeddings is 32768.
#
# Requirements:
#   quantization: "awq"        — any GPU with CUDA support
#   kv_cache_dtype: "fp8_e4m3" — Ada Lovelace / Hopper (RTX 40xx / H100) for hardware acceleration;
#                                works in software on Ampere but is slower

models:
  - name: "qwen"
    model: "Qwen/Qwen2.5-14B-Instruct-AWQ"
    usecase: "generate"
    loader: "vllm"
    num_gpus: 1
    num_cpus: 1
    vllm_engine_kwargs:
      tensor_parallel_size: 1
      max_model_len: 32768
      quantization: "awq"
      kv_cache_dtype: "fp8_e4m3"
      enable_auto_tool_choice: true
      tool_call_parser: "hermes"

  - name: "kokoro"
    model: "hexgrad/Kokoro-82M"
    usecase: "tts"
    loader: "custom"
    plugin: "kokoro"
    num_gpus: 0.2
    plugin_config:
      onnx_provider: "CUDAExecutionProvider"

  - name: "nomic-embed"
    model: "nomic-ai/nomic-embed-text-v1.5"
    usecase: "embed"
    loader: "vllm"
    num_gpus: 0.2
    vllm_engine_kwargs:
      tensor_parallel_size: 1
      trust_remote_code: true

  - name: "whisper"
    model: "openai/whisper-large-v3-turbo"
    usecase: "transcription"
    loader: "vllm"
    num_gpus: 0.3
    vllm_engine_kwargs:
      tensor_parallel_size: 1
      trust_remote_code: true


