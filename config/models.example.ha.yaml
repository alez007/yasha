# 1 × 8 GB GPU — Nano stack
# LLM: Qwen2.5-7B-Instruct-AWQ (int4) · embed: nomic · STT: Whisper Tiny · TTS: Kokoro
# GPU budget: 0.85 + 0.09 = 0.94

models:
  - name: "kokoro"
    model: "hexgrad/Kokoro-82M"
    usecase: "tts"
    loader: "custom"
    plugin: "kokoro"
    num_cpus: 1
    plugin_config:
      onnx_provider: "CPUExecutionProvider"

  - name: "nomic-embed"
    model: "nomic-ai/nomic-embed-text-v1.5"
    usecase: "embed"
    loader: "vllm"
    num_gpus: 0.09
    vllm_engine_kwargs:
      tensor_parallel_size: 1
      trust_remote_code: true

  - name: "whisper"
    model: "openai/whisper-small"
    usecase: "transcription"
    loader: "vllm"
    num_gpus: 0.15
    vllm_engine_kwargs:
      tensor_parallel_size: 1
      trust_remote_code: true

  - name: "llm"
    model: "Qwen/Qwen2.5-7B-Instruct-AWQ"
    usecase: "generate"
    loader: "vllm"
    num_gpus: 0.70
    vllm_engine_kwargs:
      tensor_parallel_size: 1
      max_model_len: 16000
      enable_auto_tool_choice: true
      tool_call_parser: "hermes"
