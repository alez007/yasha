models:
  - name: "kokoro"
    model: "hexgrad/Kokoro-82M"
    usecase: "tts"
    loader: "custom"
    plugin: "kokoro"
    num_gpus: 0.05
    plugin_config:
      onnx_provider: "CUDAExecutionProvider"

  - name: "nomic-embed"
    model: "nomic-ai/nomic-embed-text-v1.5"
    usecase: "embed"
    loader: "vllm"
    num_gpus: 0.05
    vllm_engine_kwargs:
      tensor_parallel_size: 1
      trust_remote_code: true

  - name: "whisper"
    model: "openai/whisper-small"
    usecase: "transcription"
    loader: "vllm"
    num_gpus: 0.15
    vllm_engine_kwargs:
      tensor_parallel_size: 1
      trust_remote_code: true

  - name: "llm"
    model: "Qwen/Qwen2.5-7B-Instruct-AWQ"
    usecase: "generate"
    loader: "vllm"
    num_gpus: 0.65
    vllm_engine_kwargs:
      tensor_parallel_size: 1
      max_model_len: 16000
      enable_auto_tool_choice: true
      tool_call_parser: "hermes"
