# Kokoro ONNX TTS plugin — install with `uv sync --extra kokoroonnx`
# or set MSHIP_PLUGINS=kokoroonnx for Docker.
#
# The same model name can appear twice with different configs; requests are
# load-balanced round-robin across all matching deployments.

models:
  # GPU instance (3 replicas for concurrency)
  - name: "kokoro"
    model: "hexgrad/Kokoro-82M"
    usecase: "tts"
    loader: "custom"
    plugin: "kokoroonnx"
    num_gpus: 0.07
    num_replicas: 3
    plugin_config:
      onnx_provider: "CUDAExecutionProvider"

  # CPU fallback (no GPU required)
  - name: "kokoro"
    model: "hexgrad/Kokoro-82M"
    usecase: "tts"
    loader: "custom"
    plugin: "kokoroonnx"
    num_gpus: 0
    num_cpus: 1
    num_replicas: 1
    plugin_config:
      onnx_provider: "CPUExecutionProvider"
