# llama.cpp loader examples — CPU-only GGUF inference.
# Ideal for quantized models on laptops, mini-PCs, and ARM hardware.

models:
  # Chat: GGUF pulled from a HuggingFace repo (glob picks the right quant)
  - name: "qwen"
    model: "lmstudio-community/Qwen2.5-7B-Instruct-GGUF"
    usecase: "generate"
    loader: "llama_cpp"
    num_cpus: 3
    llama_cpp_config:
      hf_filename: "*Q4_K_M.gguf"

  # Chat: GGUF from a local path (bind-mount the directory into the container)
  - name: "llama3-local"
    model: "/.cache/huggingface/llama-3-8b-instruct.Q4_K_M.gguf"
    usecase: "generate"
    loader: "llama_cpp"
    num_cpus: 4
    llama_cpp_config:
      n_ctx: 4096
      n_batch: 512

  # Embeddings
  - name: "nomic-embed"
    model: "nomic-ai/nomic-embed-text-v1.5-GGUF"
    usecase: "embed"
    loader: "llama_cpp"
    num_cpus: 2
    llama_cpp_config:
      hf_filename: "nomic-embed-text-v1.5.Q4_K_M.gguf"
