# Transformers loader examples — CPU-only, no GPU required.
# Great for development, small models, and environments without CUDA.

models:
  # Small chat model
  - name: "llm"
    model: "meta-llama/Llama-3.2-1B-Instruct"
    usecase: "generate"
    loader: "transformers"
    num_cpus: 4
    transformers_config:
      torch_dtype: "float32"

  # Embeddings
  - name: "nomic-embed"
    model: "nomic-ai/nomic-embed-text-v1.5"
    usecase: "embed"
    loader: "transformers"
    num_cpus: 1
    transformers_config:
      trust_remote_code: true

  # Speech-to-text (Whisper) with timestamps
  - name: "whisper"
    model: "openai/whisper-small"
    usecase: "transcription"
    loader: "transformers"
    num_cpus: 2
    transformers_config:
      torch_dtype: "float32"
      pipeline_kwargs:
        return_timestamps: true

  # TTS
  - name: "facebook"
    model: "facebook/mms-tts-eng"
    usecase: "tts"
    loader: "transformers"
    num_cpus: 1
